<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHOP — Opening Soon</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --white: #ffffff;
      --red: #ff0033;
      --red-soft: rgba(255, 0, 51, 0.18);
      --red-mid: rgba(255, 0, 51, 0.38);
      --red-strong: rgba(255, 0, 51, 0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Orbitron', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .bg-wordmark {
      position: absolute;
      inset: 0;
      background: url('NorthRiders_Scritta_26_RED.png') center center / cover no-repeat;
      opacity: 0.18;
      z-index: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.28) 0%, rgba(0,0,0,0.72) 55%, rgba(0,0,0,0.92) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.72));
      z-index: 1;
      pointer-events: none;
    }

    .wrapper {
      width: 90%;
      max-width: 1100px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: clamp(72px, 12vw, 160px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--white);
      margin-bottom: 18px;
      animation: neonPulse 2.2s ease-in-out infinite;
      text-shadow:
        0 0 4px rgba(255,255,255,0.25),
        0 0 10px var(--red-soft),
        0 0 18px var(--red-mid),
        0 0 30px var(--red-mid),
        0 0 48px var(--red-strong),
        0 0 78px var(--red-strong);
    }

    .subtitle {
      margin: 0 0 42px;
      color: var(--red);
      letter-spacing: 0.34em;
      font-size: 13px;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(255,0,51,0.35);
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }

    .box {
      border: 1px solid rgba(255,255,255,0.7);
      padding: 25px 10px;
      position: relative;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      box-shadow:
        inset 0 0 0 1px rgba(255,0,51,0.12),
        0 0 20px rgba(255,0,51,0.08);
      clip-path: polygon(
        0% 12%,
        10% 0%,
        100% 0%,
        100% 88%,
        90% 100%,
        0% 100%
      );
    }

    .value {
      font-size: clamp(30px, 5vw, 60px);
      font-weight: 700;
      color: var(--white);
      text-shadow: 0 0 10px rgba(255,255,255,0.08);
    }

    .unit {
      font-size: 11px;
      margin-top: 10px;
      color: var(--red);
      letter-spacing: 0.25em;
      text-shadow: 0 0 10px rgba(255,0,51,0.3);
    }

    .status {
      margin-top: 30px;
      color: var(--red);
      letter-spacing: 0.3em;
      font-size: 14px;
      text-shadow: 0 0 12px rgba(255,0,51,0.45);
    }

    @keyframes neonPulse {
      0%, 100% {
        opacity: 0.92;
        text-shadow:
          0 0 4px rgba(255,255,255,0.2),
          0 0 8px rgba(255,0,51,0.18),
          0 0 16px rgba(255,0,51,0.28),
          0 0 26px rgba(255,0,51,0.34),
          0 0 42px rgba(255,0,51,0.46);
      }
      50% {
        opacity: 1;
        text-shadow:
          0 0 5px rgba(255,255,255,0.35),
          0 0 12px rgba(255,0,51,0.35),
          0 0 24px rgba(255,0,51,0.55),
          0 0 42px rgba(255,0,51,0.75),
          0 0 64px rgba(255,0,51,0.95),
          0 0 92px rgba(255,0,51,1);
      }
    }

    @media (max-width: 700px) {
      .countdown { grid-template-columns: repeat(2, 1fr); }
    }
  .nr-logo {
      width: 140px;
      margin: 0 auto 30px;
      display:block;
      opacity: 0.9;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
    }

    @media (max-width: 700px) {
      .countdown { grid-template-columns: repeat(2, 1fr); }
      .nr-logo { width: 100px; }
    }
  </style>
</head>
<body>

  <div class="bg-wordmark"></div>
  <div class="overlay"></div>

  <div class="wrapper">

    <img src="NR_LOGO5.png" class="nr-logo">
    <h1>COMING SOON</h1>
    <div class="subtitle">SHOP LAUNCH</div>

    <div class="countdown">
      <div class="box"><div id="days" class="value">00</div><div class="unit">DAYS</div></div>
      <div class="box"><div id="hours" class="value">00</div><div class="unit">HOURS</div></div>
      <div class="box"><div id="minutes" class="value">00</div><div class="unit">MIN</div></div>
      <div class="box"><div id="seconds" class="value">00</div><div class="unit">SEC</div></div>
    </div>

    <div id="status" class="status">SYSTEM READY</div>
  </div>

  <script>
    const openingDate = new Date("2026-04-19T19:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const dist = openingDate - now;

      if (dist <= 0) {
        document.getElementById("days").innerText = "00";
        document.getElementById("hours").innerText = "00";
        document.getElementById("minutes").innerText = "00";
        document.getElementById("seconds").innerText = "00";
        document.getElementById("status").innerText = "SHOP OPEN";
        return;
      }

      const d = Math.floor(dist / (1000 * 60 * 60 * 24));
      const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((dist % (1000 * 60)) / 1000);

      document.getElementById("days").innerText = String(d).padStart(2, '0');
      document.getElementById("hours").innerText = String(h).padStart(2, '0');
      document.getElementById("minutes").innerText = String(m).padStart(2, '0');
      document.getElementById("seconds").innerText = String(s).padStart(2, '0');
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>

</body>
</html>
